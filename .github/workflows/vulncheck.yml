name: Daily vulnerability Check

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  vulncheck:
    name: vulnerability check
    runs-on: ubuntu-24.04
    steps:
      - name: Clone code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Run vulncheck
        id: vulncheck
        run: |
          set +e
          make vulncheck > /tmp/vulncheck.txt 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT
      - name: Open issue if vulnerabilities found
        if: steps.vulncheck.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --search "Vulnerability detected in:title" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already exists, skipping."
            exit 0
          fi
          {
            printf '## Vulnerability check output\n\n```\n'
            cat /tmp/vulncheck.txt
            printf '```\n'
          } > /tmp/issue_body.txt
          gh issue create \
            --title "Vulnerability detected ($(date -u '+%Y-%m-%d'))" \
            --body-file /tmp/issue_body.txt
